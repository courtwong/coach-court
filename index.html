      const {data:ins,error:e}=await sb.from('workout_history').insert({user_id:session.user.id,date:today,category_id:nav.categoryId,workout_id:nav.workoutId,duration:mins,weight_log:weights}).select().single();
      if(e)throw e;
      const wu=Object.entries(weights).map(([k,v])=>({user_id:session.user.id,exercise_key:k,weight:v,updated_at:new Date().toISOString()}));
      if(wu.length)await sb.from('weight_history').upsert(wu);
      setData(d=>({...d,history:[{id:ins.id,date:ins.date,categoryId:ins.category_id,workoutId:ins.workout_id,duration:ins.duration},...d.history],weightHistory:{...d.weightHistory,...weights}}));
    }catch(e){setError('Save failed.');}
    setNav(null);setTab('home');
  };
  const saveProfile=async u=>{setData(d=>({...d,profile:u}));setShowEdit(false);await sb.from('profile').upsert({user_id:session.user.id,...u});};
  const saveWorkout=async w=>{setData(d=>({...d,customWorkouts:[...(d.customWorkouts||[]),w]}));setShowBuilder(false);setNav({type:'category',categoryId:w.categoryId});await sb.from('custom_workouts').insert({id:w.id,user_id:session.user.id,label:w.label,emoji:w.emoji,category_id:w.categoryId,steps:w.steps});};
  const deleteWorkout=async id=>{setData(d=>({...d,customWorkouts:(d.customWorkouts||[]).filter(w=>w.id!==id)}));await sb.from('custom_workouts').delete().eq('id',id).eq('user_id',session.user.id);};
  const saveRecipe=r=>{const updated=[...customRecipes,r];setCustomRecipes(updated);localStorage.setItem('cc-recipes',JSON.stringify(updated));setShowRecipeBuilder(false);};
  const deleteRecipe=id=>{const updated=customRecipes.filter(r=>r.id!==id);setCustomRecipes(updated);localStorage.setItem('cc-recipes',JSON.stringify(updated));};
  const saveRecipePhoto=(recipeId,photo)=>{setRecipePhotos(prev=>{const photos=[...(prev[recipeId]||[]),photo];const updated={...prev,[recipeId]:photos};localStorage.setItem('cc-recipe-photos',JSON.stringify(updated));return updated;});};
  const saveRecipeComment=(recipeId,comment)=>{setRecipeComments(prev=>{const updated={...prev,[recipeId]:comment};localStorage.setItem('cc-recipe-comments',JSON.stringify(updated));return updated;});};
  const deleteHistoryEntry=async id=>{setData(d=>({...d,history:d.history.filter(h=>h.id!==id)}));await sb.from('workout_history').delete().eq('id',id).eq('user_id',session.user.id);};
  const editHistoryEntry=async(id,mins)=>{setData(d=>({...d,history:d.history.map(h=>h.id===id?{...h,duration:mins}:h)}));await sb.from('workout_history').update({duration:mins}).eq('id',id).eq('user_id',session.user.id);};
  const logPastWorkout=async(date,categoryId,workoutId,duration)=>{
    try{
      const {data:ins,error:e}=await sb.from('workout_history').insert({user_id:session.user.id,date,category_id:categoryId,workout_id:workoutId,duration,weight_log:{}}).select().single();
      if(e)throw e;
      setData(d=>({...d,history:[...d.history,{id:ins.id,date:ins.date,categoryId:ins.category_id,workoutId:ins.workout_id,duration:ins.duration}].sort((a,b)=>b.date.localeCompare(a.date))}));
    }catch(e){setError('Could not save workout.');}
  };
  const finishCooking=(photo,mins)=>{
    if(nav?.recipeId){
      const recipe=getRecipe(nav.recipeId,customRecipes);
      if(recipe){
        const entry={id:uid(),date:new Date().toISOString().split('T')[0],recipeId:nav.recipeId,mealType:recipe.mealType||'dinner',label:recipe.label,emoji:recipe.emoji,duration:mins||1};
        setCookingLog(prev=>{const updated=[entry,...prev];localStorage.setItem('cc-cooking-log',JSON.stringify(updated));return updated;});
      }
      if(photo){
        setRecipePhotos(prev=>{const photos=[...(prev[nav.recipeId]||[]),photo];const updated={...prev,[nav.recipeId]:photos};localStorage.setItem('cc-recipe-photos',JSON.stringify(updated));return updated;});
      }
    }
    setNav(null);setTab('kitchen');
  };
  const deleteCookingEntry=id=>{setCookingLog(prev=>{const updated=prev.filter(e=>e.id!==id);localStorage.setItem('cc-cooking-log',JSON.stringify(updated));return updated;});};

  const streak=(()=>{let s=0;const t=new Date();for(let i=0;i<60;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(history.find(w=>w.date===d.toISOString().split('T')[0]))s++;else if(i>0)break;}return s;})();
  const weekCount=history.filter(w=>new Date()-new Date(w.date)<7*86400000).length;
  const weekMins=history.filter(w=>new Date()-new Date(w.date)<7*86400000).reduce((a,w)=>a+w.duration,0);
  const hour=new Date().getHours();
  const greetWord=hour<12?'Morning':hour<17?'Afternoon':'Evening';
  const firstName=profile.name?.split(' ')[0]||'there';
  const weekKitchenCount=cookingLog.filter(e=>new Date()-new Date(e.date+'T00:00:00')<7*86400000).length;
  const recentAll=[...history.map(e=>({...e,_type:'workout'})),...cookingLog.map(e=>({...e,_type:'cooking'}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);

  if(session===undefined) return <div className="loading-screen"><div className="loading-wordmark">Coach <span>Court</span></div><div className="spinner"/></div>;
  if(resetMode) return <SetNewPasswordScreen onDone={()=>{setResetMode(false);setNav(null);setTab('home');}}/>;
  if(!session) return <AuthScreen/>;
  if(dataLoading) return <div className="loading-screen"><div className="loading-wordmark">Coach <span>Court</span></div><div className="spinner"/><div style={{fontSize:13,fontWeight:600,color:'var(--muted)'}}>Loading…</div></div>;
  if(nav?.type==='workout') return <WorkoutFlow categoryId={nav.categoryId} workoutId={nav.workoutId} onFinish={finishWorkout} onBack={()=>setNav({type:'category',categoryId:nav.categoryId})} weightHistory={wh} onUpdateWeight={updateWeight} customWorkouts={custom}/>;
  if(nav?.type==='cooking') return <CookingFlow recipeId={nav.recipeId} onFinish={finishCooking} onBack={()=>{setNav(null);setTab('kitchen');}} customRecipes={customRecipes}/>;

  return (<>
    {showEdit&&<EditProfileModal profile={profile} onSave={saveProfile} onClose={()=>setShowEdit(false)}/>}
    {showBuilder&&<WorkoutBuilder onSave={saveWorkout} onClose={()=>setShowBuilder(false)}/>}
    {showRecipeBuilder&&<RecipeBuilder defaultMealType={nav?.mealType} onSave={saveRecipe} onClose={()=>setShowRecipeBuilder(false)}/>}
    {homeEditEntry&&<EditWorkoutModal entry={homeEditEntry} onSave={(id,mins)=>{editHistoryEntry(id,mins);setHomeEditEntry(null);}} onClose={()=>setHomeEditEntry(null)} customWorkouts={custom}/>}

    <div className="topbar">
      <div className="topbar-left">
        <div className="greeting-text">Good {greetWord}</div>
        <div className="name-text">{firstName} 👋</div>
      </div>
      <div className="topbar-right">
        <div className="streak-pill">🔥 {streak}</div>
        <button className="signout-pill" onClick={signOut}>Sign out</button>
      </div>
    </div>
    {error&&<div className="error-bar">⚠️ {error}</div>}

    <div className="scroll">
      {nav?.type==='category'&&<CategoryDetail categoryId={nav.categoryId} onBack={()=>setNav(null)} onStart={(c,w)=>setNav({type:'workout',categoryId:c,workoutId:w})} customWorkouts={custom} onDelete={deleteWorkout} onBuild={()=>setShowBuilder(true)} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
      {nav?.type==='favorites'&&<FavoritesDetail onBack={()=>setNav(null)} onStart={(c,w)=>setNav({type:'workout',categoryId:c,workoutId:w})} customWorkouts={custom} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
      {nav?.type==='mealCategory'&&<RecipeCategoryDetail mealType={nav.mealType} onBack={()=>setNav(null)} onViewRecipe={id=>setNav({type:'recipeDetail',recipeId:id,fromMealType:nav.mealType})} customRecipes={customRecipes} recipePhotos={recipePhotos} recipeFavorites={recipeFavorites} onToggleRecipeFavorite={toggleRecipeFavorite}/>}
      {nav?.type==='recipeFavorites'&&<RecipeFavoritesDetail onBack={()=>setNav(null)} onViewRecipe={(id,mealType)=>setNav({type:'recipeDetail',recipeId:id,fromMealType:mealType,fromFavorites:true})} customRecipes={customRecipes} recipePhotos={recipePhotos} recipeFavorites={recipeFavorites} onToggleRecipeFavorite={toggleRecipeFavorite}/>}
      {nav?.type==='recipeDetail'&&<RecipeDetail recipeId={nav.recipeId} onBack={()=>setNav(nav.fromFavorites?{type:'recipeFavorites'}:{type:'mealCategory',mealType:nav.fromMealType||'dinner'})} onStartCooking={id=>setNav({type:'cooking',recipeId:id})} customRecipes={customRecipes} recipePhotos={recipePhotos} onSavePhoto={saveRecipePhoto} recipeComments={recipeComments} onSaveComment={saveRecipeComment} onDeleteRecipe={id=>{deleteRecipe(id);setNav(nav.fromFavorites?{type:'recipeFavorites'}:{type:'mealCategory',mealType:nav.fromMealType||'dinner'});}}/>}

      {!nav&&tab==='home'&&(<>
        <div className="stats-row" style={{marginTop:14}}>
          <div className="stat-card" style={{background:COLORS.lower.bg}}><div className="stat-num" style={{color:COLORS.lower.text}}>{weekCount}</div><div className="stat-lbl" style={{color:COLORS.lower.text}}>Workouts</div></div>
          <div className="stat-card" style={{background:COLORS.kitchen.bg}}><div className="stat-num" style={{color:COLORS.kitchen.text}}>{weekKitchenCount}</div><div className="stat-lbl" style={{color:COLORS.kitchen.text}}>Cooked</div></div>
          <div className="stat-card" style={{background:COLORS.cardio.bg}}><div className="stat-num" style={{color:COLORS.cardio.text}}>{weekMins}m</div><div className="stat-lbl" style={{color:COLORS.cardio.text}}>Minutes</div></div>
        </div>
        {recentAll.length>0&&(<>
          <div className="section-title">Recent Activity</div>
          <div className="recent-list">
            {recentAll.map((entry,i)=>{
              if(entry._type==='workout'){
                const c=COLORS[entry.categoryId];const wDef=getWorkout(entry.categoryId,entry.workoutId,custom);const isLight=c.text!=='#FFFFFF';
                return <div key={i} className="recent-card" style={{background:c.bg}}><div className="recent-icon">{CATEGORIES[entry.categoryId]?.emoji}</div><div style={{flex:1}}><div className="recent-name" style={{color:c.text}}>{wDef?.label||CATEGORIES[entry.categoryId]?.label}</div><div className="recent-meta" style={{color:c.text}}>{new Date(entry.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><div className="recent-dur" style={{color:c.text}}>{entry.duration}m</div><div style={{display:'flex',gap:5}}><button className="log-action-btn" style={{background:'rgba(255,255,255,0.22)',color:c.text}} onClick={ev=>{ev.stopPropagation();setHomeEditEntry(entry);}}>Edit</button><button className="log-action-btn" style={{background:isLight?'rgba(200,0,0,0.12)':'rgba(255,255,255,0.18)',color:isLight?'#CC0000':c.text}} onClick={ev=>{ev.stopPropagation();if(confirm('Delete this workout?'))deleteHistoryEntry(entry.id);}}>Del</button></div></div></div>;
              } else {
                const cat=MEAL_CATEGORIES[entry.mealType||'dinner'];
                return <div key={i} className="recent-card" style={{background:'#4ECDC4'}}><div className="recent-icon">{entry.emoji}</div><div style={{flex:1}}><div className="recent-name" style={{color:'#fff'}}>{entry.label}</div><div className="recent-meta" style={{color:'#fff'}}>{cat.emoji} {cat.label} · {new Date(entry.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><div className="recent-dur" style={{color:'#fff'}}>{entry.duration}m</div><div style={{display:'flex',gap:5}}><button className="log-action-btn" style={{background:'rgba(255,255,255,0.22)',color:'#fff'}} onClick={ev=>{ev.stopPropagation();if(confirm('Delete this entry?'))deleteCookingEntry(entry.id);}}>Del</button></div></div></div>;
              }
            })}
          </div>
        </>)}
        <CalendarView history={history} customWorkouts={custom} cookingLog={cookingLog} onDeleteEntry={deleteHistoryEntry} onEditEntry={editHistoryEntry} onDeleteCookingEntry={deleteCookingEntry} scheduledItems={scheduledItems} onAddSchedule={addScheduledItem} onDeleteSchedule={deleteScheduledItem} customRecipes={customRecipes} onLogPastWorkout={logPastWorkout}/>
      </>)}

      {!nav&&tab==='fitness'&&(<>
        <div className="section-title" style={{marginTop:14}}>Workouts</div>
        <div className="category-list">
          {favorites.length>0&&(
            <div className="category-card" style={{background:'#FFD700'}} onClick={()=>setNav({type:'favorites'})}>
              <div className="cat-top">
                <div className="cat-name" style={{color:'#5A4200'}}>Favorites</div>
                <div className="cat-arrow-circle" style={{background:'rgba(0,0,0,0.12)'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5A4200" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
              </div>
              <div className="cat-pills">
                <div className="cat-pill" style={{color:'#5A4200'}}>⭐ Saved</div>
                <div className="cat-pill" style={{color:'#5A4200'}}>{favorites.length} workout{favorites.length!==1?'s':''}</div>
              </div>
            </div>
          )}
          {Object.entries(CATEGORIES).map(([key,cat])=>{
            const col=COLORS[key];const cc=custom.filter(w=>w.categoryId===key).length;const tot=cat.workouts.length+cc;
            const accentBg=col.text==='#FFFFFF'?'rgba(255,255,255,0.22)':'rgba(0,0,0,0.12)';
            return (
              <div key={key} className="category-card" style={{background:col.bg}} onClick={()=>setNav({type:'category',categoryId:key})}>
                <div className="cat-top">
                  <div className="cat-name" style={{color:col.text}}>{cat.label}</div>
                  <div className="cat-arrow-circle" style={{background:accentBg}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={col.text} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                  </div>
                </div>
                <div className="cat-pills">
                  <div className="cat-pill" style={{color:col.text}}>{cat.emoji} {key.charAt(0).toUpperCase()+key.slice(1)}</div>
                  <div className="cat-pill" style={{color:col.text}}>{tot} {tot===1?'workout':'workouts'}</div>
                </div>
              </div>
            );
          })}
        </div>
        <button className="build-btn" style={{marginTop:12}} onClick={()=>setShowBuilder(true)}>✨ Build a Workout</button>
        {history.length>0&&(<>
          <div className="section-title">Recent</div>
          <div className="recent-list">{history.slice(0,3).map((e,i)=>{const c=COLORS[e.categoryId];const wDef=getWorkout(e.categoryId,e.workoutId,custom);const isLight=c.text!=='#FFFFFF';return <div key={i} className="recent-card" style={{background:c.bg}}><div className="recent-icon">{CATEGORIES[e.categoryId]?.emoji}</div><div style={{flex:1}}><div className="recent-name" style={{color:c.text}}>{wDef?.label||CATEGORIES[e.categoryId]?.label}</div><div className="recent-meta" style={{color:c.text}}>{new Date(e.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><div className="recent-dur" style={{color:c.text}}>{e.duration}m</div><div style={{display:'flex',gap:5}}><button className="log-action-btn" style={{background:'rgba(255,255,255,0.22)',color:c.text}} onClick={ev=>{ev.stopPropagation();setHomeEditEntry(e);}}>Edit</button><button className="log-action-btn" style={{background:isLight?'rgba(200,0,0,0.12)':'rgba(255,255,255,0.18)',color:isLight?'#CC0000':c.text}} onClick={ev=>{ev.stopPropagation();if(confirm('Delete this workout?'))deleteHistoryEntry(e.id);}}>Del</button></div></div></div>;})} </div>
        </>)}
      </>)}

      {!nav&&tab==='kitchen'&&<KitchenView onSelectMealType={key=>setNav({type:'mealCategory',mealType:key})} onSelectFavorites={()=>setNav({type:'recipeFavorites'})} customRecipes={customRecipes} recipeFavorites={recipeFavorites} onBuildRecipe={()=>setShowRecipeBuilder(true)} onViewRecipe={(id,mealType)=>setNav({type:'recipeDetail',recipeId:id,fromMealType:mealType})}/>}
      {!nav&&tab==='profile'&&<ProfileView history={history} profile={profile} userEmail={userEmail} onEdit={()=>setShowEdit(true)} onSignOut={signOut}/>}
    </div>

    {!nav&&(
      <div className="nav-wrap">
        <div className="nav-inner">
          {[{key:'home',icon:'🏠',label:'Home'},{key:'fitness',icon:'💪',label:'Fitness'},{key:'kitchen',icon:'🍳',label:'Kitchen'},{key:'profile',icon:'📊',label:'Account'}].map(({key,icon,label})=>(
            <button key={key} className={`nav-btn ${tab===key?'active':''}`} onClick={()=>{setTab(key);setNav(null);}}>
              <div className="nav-icon">{icon}</div>
              <div className="nav-label">{label}</div>
            </button>
          ))}
        </div>
      </div>
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
