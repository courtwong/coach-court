<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coach Court</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Coach Court" />
  <meta name="theme-color" content="#ffffff" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #C4A8FF; --purple-dark: #7C4DFF;
      --lime: #D4F54A; --lime-dark: #8FB800;
      --cobalt: #3D5AFE;
      --orange: #FF5722;
      --text: #111111; --muted: #888888; --border: #EEEEEE;
      --bg: #FFFFFF; --bg2: #F5F5F5;
      --nav-bg: #1A1A1A;
    }
    html, body { background: #fff; height: 100%; }
    body { font-family: 'Inter', sans-serif; color: var(--text); overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
    #root { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #fff; }

    .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:18px; }
    .loading-wordmark { font-size:34px; font-weight:900; letter-spacing:-2px; }
    .loading-wordmark span { color: var(--purple-dark); }
    .spinner { width:30px; height:30px; border:3px solid #eee; border-top-color:var(--purple-dark); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* AUTH */
    .auth-screen { display:flex; flex-direction:column; min-height:100vh; }
    .auth-hero { background:var(--purple); padding:64px 28px 52px; }
    .auth-hero-title { font-size:48px; font-weight:900; letter-spacing:-2.5px; line-height:1; margin-bottom:10px; }
    .auth-hero-sub { font-size:16px; font-weight:500; color:rgba(0,0,0,0.5); line-height:1.5; }
    .auth-body { flex:1; padding:36px 28px 48px; display:flex; flex-direction:column; gap:14px; }
    .auth-label { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:7px; display:block; }
    .auth-input { width:100%; border:2px solid var(--border); border-radius:16px; padding:16px 18px; font-family:'Inter',sans-serif; font-size:16px; font-weight:600; color:var(--text); background:var(--bg2); outline:none; transition:border-color 0.2s; }
    .auth-input:focus { border-color:var(--purple-dark); background:#fff; }
    .auth-main-btn { width:100%; border:none; border-radius:50px; padding:18px; font-family:'Inter',sans-serif; font-size:16px; font-weight:800; cursor:pointer; background:var(--text); color:#fff; transition:opacity 0.15s; }
    .auth-main-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .auth-google-btn { width:100%; border:2px solid var(--border); border-radius:50px; padding:16px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; background:#fff; color:var(--text); display:flex; align-items:center; justify-content:center; gap:10px; }
    .auth-divider { display:flex; align-items:center; gap:12px; }
    .auth-divider-line { flex:1; height:1px; background:var(--border); }
    .auth-divider-text { font-size:12px; font-weight:600; color:var(--muted); }
    .auth-success { background:#F0FFF4; border:2px solid #6EE7B7; border-radius:16px; padding:20px; font-size:14px; font-weight:600; color:#065F46; text-align:center; line-height:1.6; }
    .auth-error { background:#FFF0F0; border:2px solid #FFB3B3; border-radius:12px; padding:14px; font-size:13px; font-weight:600; color:#CC0000; text-align:center; }
    .auth-switch { text-align:center; font-size:14px; color:var(--muted); }
    .auth-switch button { background:none; border:none; color:var(--text); font-weight:800; cursor:pointer; font-family:'Inter',sans-serif; font-size:14px; text-decoration:underline; }
    .google-icon { width:18px; height:18px; }

    /* TOPBAR — fixed crowding */
    .topbar { padding:16px 20px 4px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .topbar-left { flex:1; min-width:0; }
    .greeting-text { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:1px; letter-spacing:0.2px; }
    .name-text { font-size:22px; font-weight:900; letter-spacing:-0.8px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .topbar-right { display:flex; align-items:center; gap:7px; flex-shrink:0; }
    .streak-pill { background:var(--lime); border-radius:50px; padding:6px 12px; font-size:13px; font-weight:800; color:#333; white-space:nowrap; }
    .signout-pill { background:var(--bg2); border:none; border-radius:50px; padding:6px 11px; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }

    /* SCROLL */
    .scroll { flex:1; overflow-y:auto; padding:16px 20px 110px; scrollbar-width:none; }
    .scroll::-webkit-scrollbar { display:none; }
    .section-title { font-size:22px; font-weight:900; letter-spacing:-0.8px; margin-bottom:14px; margin-top:26px; }

    /* WEEK STRIP */
    .week-strip { display:flex; gap:6px; margin-bottom:16px; }
    .week-day { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; }
    .week-day-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; }
    .week-day-dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; background:var(--bg2); color:var(--muted); }
    .week-day-dot.worked { background:var(--text); color:#fff; }
    .week-day-dot.today { outline:2.5px solid var(--purple-dark); outline-offset:2px; }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:4px; }
    .stat-card { border-radius:20px; padding:16px 14px; }
    .stat-num { font-size:28px; font-weight:900; letter-spacing:-1px; line-height:1; }
    .stat-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:5px; opacity:0.55; }

    /* CATEGORY CARDS */
    .category-list { display:flex; flex-direction:column; gap:12px; }
    .category-card { border-radius:26px; padding:14px 20px 13px; cursor:pointer; transition:transform 0.15s; }
    .category-card:active { transform:scale(0.97); }
    .cat-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:9px; }
    .cat-name { font-size:30px; font-weight:900; letter-spacing:-1.5px; line-height:1; }
    .cat-arrow-circle { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cat-pills { display:flex; gap:8px; flex-wrap:wrap; }
    .cat-pill { border-radius:50px; padding:7px 14px; font-size:13px; font-weight:700; background:rgba(0,0,0,0.1); }

    /* RECENT */
    .recent-list { display:flex; flex-direction:column; gap:10px; }
    .recent-card { border-radius:22px; padding:16px 18px; display:flex; align-items:center; gap:14px; }
    .recent-icon { width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; background:rgba(0,0,0,0.1); flex-shrink:0; }
    .recent-name { font-weight:800; font-size:15px; letter-spacing:-0.3px; }
    .recent-meta { font-size:12px; font-weight:500; opacity:0.55; margin-top:2px; }
    .recent-dur { font-weight:900; font-size:22px; letter-spacing:-0.5px; }

    /* BUILD BTN */
    .build-btn { width:100%; border:2.5px dashed rgba(0,0,0,0.13); border-radius:20px; padding:18px; background:transparent; font-family:'Inter',sans-serif; font-size:15px; font-weight:800; color:var(--muted); cursor:pointer; transition:all 0.15s; }
    .build-btn:hover { border-color:var(--purple-dark); color:var(--purple-dark); }

    /* NAV */
    .nav-wrap { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:398px; padding-bottom:max(env(safe-area-inset-bottom),14px); z-index:100; }
    .nav-inner { background:var(--nav-bg); border-radius:32px; display:flex; padding:8px 8px; gap:2px; }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:10px 4px 7px; border-radius:24px; transition:background 0.15s; }
    .nav-btn.active { background:rgba(255,255,255,0.13); }
    .nav-btn:active { transform:scale(0.88); }
    .nav-icon { font-size:20px; opacity:0.35; transition:opacity 0.15s; }
    .nav-btn.active .nav-icon { opacity:1; }
    .nav-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.5px; }
    .nav-btn.active .nav-label { color:rgba(255,255,255,0.9); }

    /* PAGE HEADER */
    .page-header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .back-btn { width:44px; height:44px; border-radius:50%; background:var(--bg2); border:none; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .page-title { font-size:28px; font-weight:900; letter-spacing:-1px; }
    .page-subtitle { font-size:13px; color:var(--muted); font-weight:500; margin-top:2px; }

    /* FILTER BAR */
    .filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .filter-btn { display:flex; align-items:center; gap:6px; background:var(--bg2); border:1.5px solid var(--border); border-radius:50px; padding:8px 14px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700; color:var(--text); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
    .filter-btn.active { background:var(--text); color:#fff; border-color:var(--text); }
    .filter-btn svg { width:14px; height:14px; flex-shrink:0; }
    .filter-count { background:var(--purple-dark); color:#fff; border-radius:50px; font-size:10px; font-weight:800; padding:1px 6px; margin-left:2px; }

    /* FILTER PANEL (slide-down) */
    .filter-panel { background:var(--bg2); border-radius:20px; padding:18px 16px; margin-bottom:16px; border:1.5px solid var(--border); animation:slideDown 0.2s ease; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .fp-section { margin-bottom:16px; }
    .fp-section:last-child { margin-bottom:0; }
    .fp-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
    .fp-chips { display:flex; flex-wrap:wrap; gap:7px; }
    .fp-chip { border:1.5px solid var(--border); border-radius:50px; padding:6px 13px; font-size:12px; font-weight:700; background:#fff; color:var(--text); cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.15s; white-space:nowrap; }
    .fp-chip.on { background:var(--text); color:#fff; border-color:var(--text); }
    .fp-chip.exclude { background:#FFF0F0; color:#CC0000; border-color:#FFB3B3; }
    .fp-count-row { display:flex; gap:8px; flex-wrap:wrap; }
    .fp-count-btn { border:1.5px solid var(--border); border-radius:10px; padding:7px 14px; font-size:13px; font-weight:800; background:#fff; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; min-width:44px; text-align:center; transition:all 0.15s; }
    .fp-count-btn.on { background:var(--text); color:#fff; border-color:var(--text); }
    .fp-divider { height:1px; background:var(--border); margin:12px 0; }
    .fp-clear { background:none; border:none; font-size:12px; font-weight:700; color:var(--purple-dark); cursor:pointer; font-family:'Inter',sans-serif; padding:0; }
    .fp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .fp-title { font-size:14px; font-weight:800; }
    .no-results { text-align:center; padding:36px 20px; color:var(--muted); }
    .no-results-emoji { font-size:40px; margin-bottom:10px; }
    .no-results-text { font-size:15px; font-weight:700; color:var(--text); }
    .no-results-sub { font-size:13px; margin-top:5px; }

    /* WORKOUT CARDS */
    .workout-cards { display:flex; flex-direction:column; gap:14px; }
    .workout-card { border-radius:26px; padding:22px; }
    .wc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
    .wc-name { font-size:22px; font-weight:900; letter-spacing:-0.8px; line-height:1.2; flex:1; }
    .wc-emoji { font-size:36px; }
    .wc-meta { font-size:13px; font-weight:600; opacity:0.55; margin-bottom:16px; }
    .ex-list { display:flex; flex-direction:column; gap:9px; margin-bottom:18px; }
    .ex-row { display:flex; align-items:center; gap:10px; }
    .ex-num { font-size:11px; font-weight:800; opacity:0.4; width:18px; }
    .ex-name { font-size:13px; font-weight:700; flex:1; line-height:1.3; }
    .ex-meta { font-size:12px; font-weight:600; opacity:0.5; white-space:nowrap; }
    .ss-tag { font-size:9px; font-weight:800; background:rgba(0,0,0,0.12); border-radius:5px; padding:2px 5px; text-transform:uppercase; letter-spacing:0.5px; margin-left:4px; vertical-align:middle; }
    .custom-tag { font-size:9px; font-weight:800; background:rgba(0,0,0,0.12); border-radius:5px; padding:2px 6px; text-transform:uppercase; letter-spacing:0.5px; margin-left:5px; vertical-align:middle; }
    .start-btn { width:100%; border:none; border-radius:50px; padding:15px; font-family:'Inter',sans-serif; font-size:15px; font-weight:800; cursor:pointer; background:rgba(0,0,0,0.75); color:#fff; transition:transform 0.15s; }
    .start-btn:active { transform:scale(0.97); }
    .delete-btn { background:rgba(0,0,0,0.08); border:none; border-radius:8px; padding:5px 10px; font-size:11px; font-weight:700; color:rgba(0,0,0,0.4); cursor:pointer; font-family:'Inter',sans-serif; margin-top:4px; }
    .fav-star { background:none; border:none; font-size:22px; cursor:pointer; padding:0 2px; line-height:1; transition:transform 0.15s; }
    .empty-state { text-align:center; padding:52px 24px; }
    .empty-emoji { font-size:56px; margin-bottom:14px; }
    .empty-text { font-size:18px; font-weight:900; letter-spacing:-0.5px; }
    .empty-sub { font-size:13px; color:var(--muted); margin-top:6px; }

    /* EXERCISE SCREEN */
    .ex-screen { display:flex; flex-direction:column; min-height:100vh; }
    .ex-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1.5px solid var(--border); }
    .ex-wname { font-size:13px; font-weight:700; color:var(--muted); }
    .ex-prog-text { font-size:13px; font-weight:800; }
    .prog-track { height:3px; background:var(--border); }
    .prog-fill { height:3px; transition:width 0.5s; }
    .ex-body { flex:1; padding:28px 24px 20px; display:flex; flex-direction:column; }
    .set-badge { display:inline-flex; align-items:center; border-radius:50px; padding:7px 16px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
    .ex-name-big { font-size:36px; font-weight:900; letter-spacing:-1.5px; line-height:1.05; margin-bottom:6px; }
    .ex-name-med { font-size:26px; font-weight:900; letter-spacing:-1px; line-height:1.1; margin-bottom:6px; }
    .ss-connector { font-size:13px; font-weight:700; color:var(--muted); margin:4px 0 10px; }
    .ex-reps { font-size:17px; font-weight:700; color:var(--muted); margin-bottom:22px; }
    .set-dots { display:flex; gap:8px; margin-bottom:22px; }
    .set-dot { height:8px; border-radius:4px; flex:1; background:var(--border); transition:background 0.3s; }
    .weight-card { background:var(--bg2); border-radius:20px; padding:16px 20px; margin-bottom:16px; border:1.5px solid var(--border); }
    .weight-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px; }
    .weight-row { display:flex; align-items:center; justify-content:space-between; }
    .w-btn { width:48px; height:48px; border-radius:50%; border:none; font-size:24px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.12s; background:var(--border); color:var(--text); }
    .w-btn:active { transform:scale(0.85); }
    .w-val { font-size:38px; font-weight:900; letter-spacing:-1px; }
    .w-unit { font-size:11px; font-weight:600; color:var(--muted); text-align:center; margin-top:2px; }
    .log-btn { width:100%; border:none; border-radius:50px; padding:18px; font-family:'Inter',sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:transform 0.15s; }
    .log-btn:active { transform:scale(0.97); }
    .ex-footer { background:var(--bg2); border-top:1.5px solid var(--border); padding:18px 24px 22px; }
    .upcoming-title { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px; }
    .upcoming-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .up-dot { width:7px; height:7px; border-radius:50%; background:var(--border); flex-shrink:0; }
    .up-name { font-size:13px; font-weight:700; flex:1; }
    .up-meta { font-size:11px; font-weight:600; color:var(--muted); }

    /* REST */
    .rest-screen { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; animation:popIn 0.3s cubic-bezier(0.34,1.4,0.64,1); }
    @keyframes popIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
    .rest-tag { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; background:rgba(255,255,255,0.22); border-radius:50px; padding:7px 18px; color:#fff; }
    .rest-next-lbl { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.6); }
    .rest-next-name { font-size:20px; font-weight:800; letter-spacing:-0.5px; text-align:center; padding:0 28px; color:#fff; line-height:1.3; }
    .rest-ring-wrap { position:relative; display:flex; align-items:center; justify-content:center; width:220px; height:220px; }
    .rest-ring { position:absolute; inset:0; width:100%; height:100%; }
    .rest-timer-inner { display:flex; flex-direction:column; align-items:center; }
    .rest-lbl { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); }
    .rest-time { font-size:72px; font-weight:900; line-height:1; letter-spacing:-3px; color:#fff; }
    .skip-btn { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.35); border-radius:50px; padding:12px 36px; font-size:14px; font-weight:800; color:#fff; cursor:pointer; font-family:'Inter',sans-serif; text-transform:uppercase; letter-spacing:0.5px; }

    @keyframes timerPulse { from{transform:scale(1)} to{transform:scale(1.08)} }

    /* FINISH */
    .finish-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:85vh; text-align:center; gap:14px; padding:32px 24px; }
    .finish-emoji { font-size:72px; animation:bounce 0.8s ease infinite alternate; }
    @keyframes bounce { from{transform:translateY(0) rotate(-4deg)} to{transform:translateY(-16px) rotate(4deg)} }
    .finish-title { font-size:40px; font-weight:900; letter-spacing:-2px; line-height:1.05; }
    .finish-sub { font-size:15px; color:var(--muted); font-weight:500; }
    .finish-stats { display:flex; gap:20px; background:var(--bg2); padding:20px 28px; border-radius:24px; margin:4px 0; }
    .f-stat { text-align:center; }
    .f-num { font-size:36px; font-weight:900; letter-spacing:-1px; }
    .f-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-top:3px; }
    .done-btn { border:none; border-radius:50px; padding:18px 48px; font-family:'Inter',sans-serif; font-size:16px; font-weight:800; cursor:pointer; }

    /* CALENDAR */
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:24px; }
    .cal-hdr { text-align:center; font-size:10px; font-weight:700; color:var(--muted); padding:4px 0 10px; }
    .cal-day { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--bg2); color:var(--muted); }
    .cal-day.worked { color:#fff; font-weight:800; }
    .cal-day.today { outline:2.5px solid var(--text); outline-offset:1px; }
    .cal-day.empty { background:transparent; }
    .cal-legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
    .legend-item { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); font-weight:600; }

// ─── REST ─────────────────────────────────────────────────────────────────────
function RestScreen({seconds,restType,nextName,color,onDone}) {
  const endTimeRef=useRef(Date.now()+seconds*1000);
  const totalRef=useRef(seconds);
  const [left,setLeft]=useState(seconds);
  useEffect(()=>{
    let id;
    const tick=()=>{
      const rem=Math.max(0,Math.round((endTimeRef.current-Date.now())/1000));
      setLeft(rem);
      if(rem<=0){clearInterval(id);onDone();return;}
    };
    tick();
    id=setInterval(tick,500);
    return()=>clearInterval(id);
  },[]);
  const adjust=delta=>{
    endTimeRef.current+=delta*1000;
    if(delta>0)totalRef.current+=delta;
    setLeft(Math.max(0,Math.round((endTimeRef.current-Date.now())/1000)));
  };
  const pct=Math.min(1,totalRef.current>0?left/totalRef.current:0);
  const r=90,circ=2*Math.PI*r;
  const urgent=left>0&&left<=5;
  const bg=urgent?'#FF3B30':color;
  return (
    <div className="rest-screen" style={{background:bg,transition:'background 0.6s ease'}}>
      <div className="rest-tag">{restType==='between-sets'?'Between Sets':'Between Exercises'}</div>
      <div className="rest-next-lbl">Up next</div>
      <div className="rest-next-name">{nextName}</div>
      <div className="rest-ring-wrap">
        <svg className="rest-ring" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="8"/>
          <circle cx="110" cy="110" r={r} fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="8" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform="translate(220,0) scale(-1,1) rotate(-90 110 110)" style={{transition:'stroke-dashoffset 0.5s linear'}}/>
        </svg>
        <div className="rest-timer-inner"><div className="rest-lbl">Rest</div><div className="rest-time" style={urgent?{animation:'timerPulse 0.5s ease infinite alternate'}:{}}>{fmt(left)}</div></div>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <button className="skip-btn" onClick={onDone}>Skip Rest</button>
        <button className="skip-btn" style={{padding:'12px 22px'}} onClick={()=>adjust(-15)}>−15s</button>
      </div>
    </div>
  );
}

// ─── WORKOUT FLOW ─────────────────────────────────────────────────────────────
function WorkoutFlow({categoryId,workoutId,onFinish,onBack,weightHistory,onUpdateWeight,customWorkouts}) {
  const col=COLORS[categoryId];
  const workout=getWorkout(categoryId,workoutId,customWorkouts);
  const [steps,setSteps]=useState(workout.steps);
  const seq=buildSeq(steps);
  const [si,setSi]=useState(0);
  const [phase,setPhase]=useState('exercise');
  const [restInfo,setRestInfo]=useState({});
  const [weights,setWeights]=useState(()=>{const w={};workout.steps.forEach(s=>sNames(s).forEach(n=>{w[n]=weightHistory[n]||0;}));return w;});
  // reorder modal state
  const [modalSteps,setModalSteps]=useState(null); // non-null = modal open
  const [dragFrom,setDragFrom]=useState(-1);
  const [dragTo,setDragTo]=useState(-1);
  const listRef=useRef(null);
  const curStepIdxRef=useRef(0);
  const startTime=useRef(Date.now());

  useEffect(()=>{
    let wakeLock=null;
    const requestWL=async()=>{try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}};
    requestWL();
    const onVis=()=>{if(document.visibilityState==='visible')requestWL();};
    document.addEventListener('visibilitychange',onVis);
    return()=>{wakeLock?.release();document.removeEventListener('visibilitychange',onVis);};
  },[]);

  // Drag event listeners — attached only while a drag is active
  useEffect(()=>{
    if(dragFrom<0)return;
    const onMove=e=>{
      const y=e.touches?e.touches[0].clientY:e.clientY;
      if(!listRef.current)return;
      const rows=listRef.current.querySelectorAll('[data-dragidx]');
      let best=dragFrom;
      rows.forEach(el=>{
        const idx=parseInt(el.dataset.dragidx);
        if(idx<curStepIdxRef.current)return;
        const r=el.getBoundingClientRect();
        if(y>r.top+r.height/2)best=idx;
      });
      setDragTo(best);
      e.preventDefault();
    };
    const onEnd=()=>{
      if(dragFrom>=0&&dragTo>=0&&dragFrom!==dragTo){
        setModalSteps(s=>{
          const a=[...s];const[item]=a.splice(dragFrom,1);a.splice(dragTo,0,item);return a;
        });
      }
      setDragFrom(-1);setDragTo(-1);
    };
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
    return()=>{
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onEnd);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onEnd);
    };
  },[dragFrom,dragTo]);

  const cur=seq[si]||seq[seq.length-1];
  const curStep=steps[cur.stepIdx];
  const curStepIdx=cur.stepIdx;
  curStepIdxRef.current=curStepIdx;
  const isLastSeq=si>=seq.length-1;
  const isLastSet=cur.setIdx>=curStep.sets-1;
  const accentColor=col.bg==='#D4F54A'?'#8FB800':col.bg==='#C4A8FF'?'#7C4DFF':col.bg;

  const openReorder=()=>setModalSteps([...steps]);
  const cancelReorder=()=>{setModalSteps(null);setDragFrom(-1);setDragTo(-1);};
  const doneReorder=()=>{
    const curExercise=steps[curStepIdx];
    const newIdx=modalSteps.indexOf(curExercise);
    const newSeq=buildSeq(modalSteps);
    const newSi=newSeq.findIndex(s=>s.stepIdx===newIdx&&s.setIdx===cur.setIdx);
    setSteps(modalSteps);
    if(newSi>=0)setSi(newSi);
    setModalSteps(null);setDragFrom(-1);setDragTo(-1);
  };

  const startDrag=(e,idx)=>{
    if(idx<curStepIdx)return;
    e.preventDefault();
    setDragFrom(idx);setDragTo(idx);
  };

  const handleLog=()=>{
    sNames(curStep).forEach(n=>onUpdateWeight(n,weights[n]));
    if(isLastSeq){setPhase('done');return;}
    const ns=seq[si+1];const nstep=steps[ns.stepIdx];
    setRestInfo({seconds:isLastSet?120:90,type:isLastSet?'between-exercises':'between-sets',nextName:sLabel(nstep)+(ns.setIdx===0?'':` — Set ${ns.setIdx+1}`)});
    setPhase('rest');
  };

  if(phase==='done'){
    const mins=Math.max(1,Math.round((Date.now()-startTime.current)/60000));
    return (
      <div className="finish-screen">
        <div className="finish-emoji">🎉</div>
        <div className="finish-title">You crushed it! 💥</div>
        <div className="finish-sub">{workout.emoji} {workout.label}</div>
        <div className="finish-stats">
          <div className="f-stat"><div className="f-num" style={{color:accentColor}}>{steps.length}</div><div className="f-lbl">Exercises</div></div>
          <div className="f-stat"><div className="f-num" style={{color:accentColor}}>{seq.length}</div><div className="f-lbl">Sets</div></div>
          <div className="f-stat"><div className="f-num" style={{color:accentColor}}>{mins}m</div><div className="f-lbl">Time</div></div>
        </div>
        <button className="done-btn" style={{background:col.bg,color:col.text}} onClick={()=>onFinish(mins,weights)}>Back to Home 🏠</button>
      </div>
    );
  }
  if(phase==='rest') return <RestScreen seconds={restInfo.seconds} restType={restInfo.type} nextName={restInfo.nextName} color={accentColor} onDone={()=>{setPhase('exercise');setSi(i=>i+1);}}/>;

  // Live drag preview: show items in their dragged position
  const displaySteps=modalSteps?[...modalSteps]:[];
  if(dragFrom>=0&&dragTo>=0&&dragFrom!==dragTo){
    const[item]=displaySteps.splice(dragFrom,1);displaySteps.splice(dragTo,0,item);
  }

  const pct=(si/seq.length)*100;
  const upcoming=[];let last=curStepIdx;
  for(let i=si+1;i<seq.length;i++){const s=seq[i];if(s.stepIdx!==last){upcoming.push({step:steps[s.stepIdx],stepIdx:s.stepIdx});last=s.stepIdx;if(upcoming.length>=3)break;}}
  const hasFuture=steps.length>curStepIdx+1;

  return (
    <div className="ex-screen">
      {modalSteps&&(
        <div className="modal-overlay" onClick={cancelReorder}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Reorder Exercises</div>
            <div style={{fontSize:12,color:'var(--muted)',fontWeight:500,textAlign:'center',marginBottom:16,marginTop:-8}}>Hold and drag the handle to reorder upcoming exercises</div>
            <div ref={listRef}>
              {displaySteps.map((step,displayIdx)=>{
                const origIdx=steps.indexOf(step);
                const isDoneOrCurrent=origIdx<curStepIdx;
                const isDragging=dragFrom>=0&&origIdx===steps.indexOf(modalSteps[dragFrom]);
                return (
                  <div key={origIdx} data-dragidx={displayIdx}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'12px 4px',borderBottom:'1px solid var(--border)',opacity:isDoneOrCurrent?0.35:1,background:isDragging?'var(--bg2)':'transparent',borderRadius:isDragging?12:0,transition:'background 0.1s'}}>
                    {/* Drag handle */}
                    <div
                      onTouchStart={isDoneOrCurrent?undefined:e=>startDrag(e,displayIdx)}
                      onMouseDown={isDoneOrCurrent?undefined:e=>startDrag(e,displayIdx)}
                      style={{fontSize:18,color:isDoneOrCurrent?'var(--border)':'var(--muted)',cursor:isDoneOrCurrent?'default':'grab',padding:'0 4px',userSelect:'none',touchAction:'none',flexShrink:0}}>⠿</div>
                    {/* Number badge */}
                    <div style={{width:24,height:24,borderRadius:8,background:isDoneOrCurrent?'var(--border)':accentColor,color:isDoneOrCurrent?'var(--muted)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{displayIdx+1}</div>
                    {/* Name */}
                    <div style={{flex:1,fontSize:14,fontWeight:700,color:'var(--text)'}}>
                      {sLabel(step)}
                      <span style={{fontSize:11,fontWeight:500,color:'var(--muted)',marginLeft:6}}>{step.sets}×{Array.isArray(step.reps)?step.reps[0]:step.reps}</span>
                      {origIdx===curStepIdx&&<span style={{marginLeft:8,fontSize:10,fontWeight:800,color:accentColor,textTransform:'uppercase',letterSpacing:'0.5px'}}>Now</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            <button className="modal-save" style={{width:'100%',marginTop:20}} onClick={doneReorder}>Done</button>
            <button className="modal-cancel" style={{width:'100%',marginTop:8,textAlign:'center'}} onClick={cancelReorder}>Cancel</button>
          </div>
        </div>
      )}
      <div className="ex-header">
        <button className="back-btn" onClick={onBack}>←</button>
        <div className="ex-wname">{workout.emoji} {workout.label}</div>
        <div className="ex-prog-text">{curStepIdx+1} / {steps.length}</div>
      </div>
      <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`,background:accentColor}}/></div>
      <div className="ex-body">
        <div className="set-badge" style={{background:col.bg,color:col.text}}>
          Set {cur.setIdx+1} of {curStep.sets}
          {curStep.type==='superset'&&<span style={{marginLeft:8,fontSize:9,fontWeight:800,background:'rgba(0,0,0,0.15)',borderRadius:5,padding:'2px 6px',letterSpacing:'0.5px'}}>SUPERSET</span>}
        </div>
        {curStep.type==='superset'?(<>
          <div className="ex-name-big">{curStep.names[0]}</div><div className="ex-reps">{curStep.reps[0]} reps</div>
          <div className="ss-connector">+ immediately into</div>
          <div className="ex-name-med">{curStep.names[1]}</div><div className="ex-reps">{curStep.reps[1]} reps</div>
        </>):(<><div className="ex-name-big">{curStep.name}</div><div className="ex-reps">{curStep.reps} reps</div></>)}
        <div className="set-dots">{Array.from({length:curStep.sets}).map((_,i)=><div key={i} className="set-dot" style={{background:i<=cur.setIdx?accentColor:'var(--border)'}}/>)}</div>
        {curStep.type==='superset'?(
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            {curStep.names.map((n)=>(
              <div key={n} className="weight-card" style={{flex:1,marginBottom:0}}>
                <div className="weight-label">{n.split(' ')[0]}</div>
                <div className="weight-row">
                  <button className="w-btn" style={{background:col.bg,color:col.text}} onClick={()=>setWeights(w=>({...w,[n]:Math.max(0,(w[n]||0)-5)}))}>−</button>
                  <div style={{textAlign:'center'}}><div className="w-val" style={{fontSize:30}}>{weights[n]||0}</div><div className="w-unit">lbs</div></div>
                  <button className="w-btn" style={{background:col.bg,color:col.text}} onClick={()=>setWeights(w=>({...w,[n]:(w[n]||0)+5}))}>+</button>
                </div>
              </div>
            ))}
          </div>
        ):(
          <div className="weight-card">
            <div className="weight-label">Weight</div>
            <div className="weight-row">
              <button className="w-btn" style={{background:col.bg,color:col.text}} onClick={()=>setWeights(w=>({...w,[curStep.name]:Math.max(0,(w[curStep.name]||0)-5)}))}>−</button>
              <div style={{textAlign:'center'}}><div className="w-val">{weights[curStep.name]||0}</div><div className="w-unit">lbs</div></div>
              <button className="w-btn" style={{background:col.bg,color:col.text}} onClick={()=>setWeights(w=>({...w,[curStep.name]:(w[curStep.name]||0)+5}))}>+</button>
            </div>
          </div>
        )}
        <button className="log-btn" style={{background:accentColor,color:'#fff'}} onClick={handleLog}>
          {isLastSeq?'✓ Complete Workout!':isLastSet?'✓ Done — Rest 2 min':'✓ Done — Rest 90s'}
        </button>
      </div>
      <div className="ex-footer">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div className="upcoming-title" style={{marginBottom:0}}>Coming Up</div>
          {hasFuture&&<button onClick={openReorder} style={{background:accentColor,border:'none',borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:800,color:'#fff',cursor:'pointer',fontFamily:'Inter,sans-serif',letterSpacing:'0.2px'}}>Reorder ⠿</button>}
        </div>
        {!isLastSet&&<div className="upcoming-row"><div className="up-dot" style={{background:accentColor}}/><div className="up-name">{sLabel(curStep)}</div><div className="up-meta">Set {cur.setIdx+2}/{curStep.sets}</div></div>}
        {upcoming.map(({step,stepIdx},i)=><div key={stepIdx} className="upcoming-row" style={{opacity:1-i*0.2}}><div className="up-dot"/><div className="up-name">{sLabel(step)}</div><div className="up-meta">{step.sets}×{Array.isArray(step.reps)?step.reps[0]:step.reps}</div></div>)}
        {isLastSet&&upcoming.length===0&&<div style={{fontSize:13,fontWeight:700,color:'var(--muted)',fontStyle:'italic'}}>Last one — finish strong! 💪</div>}
      </div>
    </div>
  );
}

// ─── WORKOUT BUILDER ──────────────────────────────────────────────────────────
const EMOJIS=['🏋️','💪','🦵','🍑','👑','🔥','⚡','🌟','🏃','🧘','🤸','🥊','🏊','🚴','🎯'];
function WorkoutBuilder({onSave,onClose}) {
  const [name,setName]=useState('');
  const [emoji,setEmoji]=useState('🏋️');
  const [catId,setCatId]=useState('lower');
  const [steps,setSteps]=useState([{id:uid(),type:'single',name:'',sets:'3',reps:'',name2:'',reps2:''}]);
  const addStep=()=>setSteps(s=>[...s,{id:uid(),type:'single',name:'',sets:'3',reps:'',name2:'',reps2:''}]);
  const removeStep=id=>setSteps(s=>s.filter(x=>x.id!==id));
  const moveStep=(id,dir)=>setSteps(s=>{const idx=s.findIndex(x=>x.id===id);const n=idx+dir;if(n<0||n>=s.length)return s;const a=[...s];[a[idx],a[n]]=[a[n],a[idx]];return a;});
  const upd=(id,f,v)=>setSteps(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));
  const save=()=>{
    if(!name.trim())return alert('Enter a workout name.');
    const valid=steps.filter(s=>s.name.trim());
    if(!valid.length)return alert('Add at least one exercise.');
    const built=valid.map(s=>s.type==='superset'&&s.name2.trim()?{type:'superset',names:[s.name.trim(),s.name2.trim()],sets:parseInt(s.sets)||3,reps:[s.reps||'10',s.reps2||'10']}:{type:'single',name:s.name.trim(),sets:parseInt(s.sets)||3,reps:s.reps||'10'});
    onSave({id:uid(),label:name.trim(),emoji,categoryId:catId,custom:true,steps:built});
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-title">Build a Workout ✨</div>
        <div className="form-group"><div className="form-label">Emoji</div><div className="emoji-row">{EMOJIS.map(e=><div key={e} className={`emoji-opt ${emoji===e?'selected':''}`} onClick={()=>setEmoji(e)}>{e}</div>)}</div><div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}><span style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>Custom:</span><input style={{width:52,height:42,border:'1.5px solid var(--border)',borderRadius:12,fontSize:22,textAlign:'center',fontFamily:'Inter,sans-serif',background:'var(--bg2)',outline:'none',cursor:'text'}} placeholder="😀" onChange={e=>{const v=[...e.target.value.trim()];if(v.length)setEmoji(v.slice(0,2).join(''));}} onFocus={e=>e.target.select()}/><span style={{fontSize:12,fontWeight:500,color:'var(--muted)'}}>type any emoji from your keyboard</span></div></div>
        <div className="form-group"><label className="form-label">Name</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Glute Blast Sunday"/></div>
        <div className="form-group"><label className="form-label">Category</label><select className="form-select" value={catId} onChange={e=>setCatId(e.target.value)}>{Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}</select></div>
        <div className="divider"/>
        <div className="form-label" style={{marginBottom:12}}>Exercises</div>
        {steps.map((step,i)=>(
          <div key={step.id} className="builder-step">
            <div className="builder-hdr">
              <div className="step-num">{i+1}</div>
              <div className="type-toggle">
                <button className={`type-btn ${step.type==='single'?'active':''}`} onClick={()=>upd(step.id,'type','single')}>Single</button>
                <button className={`type-btn ${step.type==='superset'?'active':''}`} onClick={()=>upd(step.id,'type','superset')}>Superset</button>
              </div>
              <div style={{display:'flex',gap:4}}>
                <button className="remove-btn" style={{opacity:i===0?0.3:1}} disabled={i===0} onClick={()=>moveStep(step.id,-1)}>↑</button>
                <button className="remove-btn" style={{opacity:i===steps.length-1?0.3:1}} disabled={i===steps.length-1} onClick={()=>moveStep(step.id,1)}>↓</button>
                <button className="remove-btn" onClick={()=>removeStep(step.id)}>✕</button>
              </div>
            </div>
            {step.type==='single'?(<>
              <div className="b-label">Exercise Name</div>
              <div className="builder-row"><input className="b-input" value={step.name} onChange={e=>upd(step.id,'name',e.target.value)} placeholder="e.g. Barbell Squat"/></div>
              <div className="builder-row">
                <div style={{flex:1}}><div className="b-label">Sets</div><input className="b-input" value={step.sets} onChange={e=>upd(step.id,'sets',e.target.value)} type="number" placeholder="3"/></div>
                <div style={{flex:1}}><div className="b-label">Reps</div><input className="b-input" value={step.reps} onChange={e=>upd(step.id,'reps',e.target.value)} placeholder="10"/></div>
              </div>
            </>):(<>
              <div className="b-label">Exercise A</div>
              <div className="builder-row"><input className="b-input" value={step.name} onChange={e=>upd(step.id,'name',e.target.value)} placeholder="Exercise A"/><input className="b-input sm" value={step.reps} onChange={e=>upd(step.id,'reps',e.target.value)} placeholder="Reps"/></div>
              <div className="b-label">Exercise B</div>
              <div className="builder-row"><input className="b-input" value={step.name2} onChange={e=>upd(step.id,'name2',e.target.value)} placeholder="Exercise B"/><input className="b-input sm" value={step.reps2} onChange={e=>upd(step.id,'reps2',e.target.value)} placeholder="Reps"/></div>
              <div className="builder-row"><div style={{flex:1}}><div className="b-label">Sets (both)</div><input className="b-input" value={step.sets} onChange={e=>upd(step.id,'sets',e.target.value)} type="number" placeholder="3"/></div></div>
            </>)}
          </div>
        ))}
        <button className="add-step-btn" onClick={addStep}>+ Add Exercise</button>
        <div className="modal-actions"><button className="modal-cancel" onClick={onClose}>Cancel</button><button className="modal-save" onClick={save}>Save Workout</button></div>
      </div>
    </div>
  );
}

// ─── RECIPE BUILDER ───────────────────────────────────────────────────────────
const RECIPE_EMOJIS=['🍳','🥘','🫕','🍲','🥗','🍜','🍝','🥙','🌮','🍛','🎂','🥞','🍤','🫔','🥩'];
function RecipeBuilder({onSave,onClose,defaultMealType}) {
  const [name,setName]=useState('');
  const [emoji,setEmoji]=useState('🍳');
  const [mealType,setMealType]=useState(defaultMealType||'dinner');
  const [tagsInput,setTagsInput]=useState('');
  const [ingredients,setIngredients]=useState(['']);
  const [steps,setSteps]=useState([{id:uid(),instruction:'',timerMinutes:''}]);
  const addIng=()=>setIngredients(a=>[...a,'']);
  const removeIng=idx=>setIngredients(a=>a.filter((_,j)=>j!==idx));
  const updIng=(idx,v)=>setIngredients(a=>a.map((x,j)=>j===idx?v:x));
  const addStep=()=>setSteps(s=>[...s,{id:uid(),instruction:'',timerMinutes:''}]);
  const removeStep=id=>setSteps(s=>s.filter(x=>x.id!==id));
  const updStep=(id,f,v)=>setSteps(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));
  const save=()=>{
    if(!name.trim())return alert('Enter a recipe name.');
    const validIngs=ingredients.filter(i=>i.trim());
    if(!validIngs.length)return alert('Add at least one ingredient.');
    const validSteps=steps.filter(s=>s.instruction.trim());
    if(!validSteps.length)return alert('Add at least one step.');
    onSave({id:uid(),label:name.trim(),emoji,custom:true,mealType,tags:tagsInput.split(',').map(t=>t.trim()).filter(Boolean),ingredients:validIngs,steps:validSteps.map((s,idx)=>({id:idx+1,instruction:s.instruction.trim(),stepIngredients:[],timerSeconds:s.timerMinutes?parseInt(s.timerMinutes)*60:null}))});
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-title">Add a Recipe 📝</div>
        <div className="form-group">
          <div className="form-label">Emoji</div>
          <div className="emoji-row">{RECIPE_EMOJIS.map(e=><div key={e} className={`emoji-opt ${emoji===e?'selected':''}`} onClick={()=>setEmoji(e)}>{e}</div>)}</div>
        </div>
        <div className="form-group"><label className="form-label">Recipe Name</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Avocado Toast"/></div>
        <div className="form-group"><label className="form-label">Meal Type</label><select className="form-select" value={mealType} onChange={e=>setMealType(e.target.value)}>{Object.entries(MEAL_CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Tags (comma-separated, optional)</label><input className="form-input" value={tagsInput} onChange={e=>setTagsInput(e.target.value)} placeholder="e.g. Soup, Vegetarian, Quick"/></div>
        <div className="divider"/>
        <div className="form-label" style={{marginBottom:12}}>Ingredients</div>
        {ingredients.map((ing,idx)=>(
          <div key={idx} style={{display:'flex',gap:8,marginBottom:8}}>
            <input className="b-input" value={ing} onChange={e=>updIng(idx,e.target.value)} placeholder="e.g. 2 cups flour" style={{flex:1}}/>
            {ingredients.length>1&&<button onClick={()=>removeIng(idx)} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'var(--muted)',padding:'0 4px',lineHeight:1}}>✕</button>}
          </div>
        ))}
        <button className="add-step-btn" onClick={addIng}>+ Add Ingredient</button>
        <div className="divider"/>
        <div className="form-label" style={{marginBottom:12}}>Steps</div>
        {steps.map((step,i)=>(
          <div key={step.id} className="builder-step">
            <div className="builder-hdr">
              <div className="step-num">{i+1}</div>
              <div style={{flex:1,fontSize:12,fontWeight:700,color:'var(--muted)'}}>Step {i+1}</div>
              {steps.length>1&&<button className="remove-btn" onClick={()=>removeStep(step.id)}>✕</button>}
            </div>
            <div className="b-label">Instructions</div>
            <textarea className="b-input" value={step.instruction} onChange={e=>updStep(step.id,'instruction',e.target.value)} placeholder="Describe this cooking step…" rows={3} style={{resize:'none',width:'100%',marginBottom:10,lineHeight:1.5}}/>
            <div className="b-label">Timer — optional (minutes)</div>
            <input className="b-input" value={step.timerMinutes} onChange={e=>updStep(step.id,'timerMinutes',e.target.value)} type="number" placeholder="e.g. 30" style={{maxWidth:90}}/>
          </div>
        ))}
        <button className="add-step-btn" onClick={addStep}>+ Add Step</button>
        <div className="modal-actions"><button className="modal-cancel" onClick={onClose}>Cancel</button><button className="modal-save" onClick={save}>Save Recipe</button></div>
      </div>
    </div>
  );
}

// ─── FILTER PANEL ─────────────────────────────────────────────────────────────
function FilterPanel({allWorkouts, filters, setFilters, onClose, col}) {
  // Collect all unique exercise names across workouts in this category
  const allExerciseNames = useMemo(()=>{
    const names = new Set();
    allWorkouts.forEach(w=>w.steps.forEach(s=>sNames(s).forEach(n=>names.add(n))));
    return [...names].sort();
  },[allWorkouts]);

  const toggle=(field,val)=>{
    setFilters(f=>{
      const arr=[...(f[field]||[])];
      const idx=arr.indexOf(val);
      if(idx>=0) arr.splice(idx,1); else arr.push(val);
      return {...f,[field]:arr};
    });
  };
  const toggleExclude=(name)=>{
    setFilters(f=>{
      const inc=[...(f.includeExercises||[])].filter(x=>x!==name);
      const exc=[...(f.excludeExercises||[])];
      const idx=exc.indexOf(name);
      if(idx>=0) exc.splice(idx,1); else exc.push(name);
      return {...f,includeExercises:inc,excludeExercises:exc};
    });
  };
  const toggleInclude=(name)=>{
    setFilters(f=>{
      const exc=[...(f.excludeExercises||[])].filter(x=>x!==name);
      const inc=[...(f.includeExercises||[])];
      const idx=inc.indexOf(name);
      if(idx>=0) inc.splice(idx,1); else inc.push(name);
      return {...f,excludeExercises:exc,includeExercises:inc};
    });
  };
  const toggleCount=(val)=>{
    setFilters(f=>{
      const arr=[...(f.exerciseCounts||[])];
      const idx=arr.indexOf(val);
      if(idx>=0) arr.splice(idx,1); else arr.push(val);
      return {...f,exerciseCounts:arr};
    });
  };
  const clearAll=()=>setFilters({includeExercises:[],excludeExercises:[],equipment:[],exerciseCounts:[]});
  const totalActive=(filters.includeExercises||[]).length+(filters.excludeExercises||[]).length+(filters.equipment||[]).length+(filters.exerciseCounts||[]).length;

            {(filters.excludeExercises||[]).length>0&&<span style={{color:'#CC0000'}}>✕ Excluding: {(filters.excludeExercises||[]).join(', ')}.</span>}
          </div>

      <div className="fp-divider"/>

      {/* Exercise count */}
      <div className="fp-section">

      </div>
    </div>
  );
}

// helper: does workout match filters?
function matchesFilters(workout, filters) {
  const {includeExercises=[],excludeExercises=[],equipment=[],exerciseCounts=[]}=filters;
  const allNames = workout.steps.flatMap(s=>sNames(s));
  const count = workout.steps.length;

  if(includeExercises.length>0 && !includeExercises.every(n=>allNames.includes(n))) return false;
  if(excludeExercises.length>0 && excludeExercises.some(n=>allNames.includes(n))) return false;
  if(exerciseCounts.length>0){
    const matches=exerciseCounts.some(c=>c==='6+'?count>=6:c===count);
    if(!matches) return false;
  }
  if(equipment.length>0){
    const workoutEquip=new Set(allNames.flatMap(n=>getEquipment(n)));
    if(!equipment.some(e=>workoutEquip.has(e))) return false;
  }
  return true;
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function CalendarView({history,customWorkouts,cookingLog,onDeleteEntry,onEditEntry,onDeleteCookingEntry,scheduledItems,onAddSchedule,onDeleteSchedule,customRecipes,onLogPastWorkout}) {
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  const wmap={};history.forEach(w=>{wmap[w.date]=w;});
  const cmap={};(cookingLog||[]).forEach(c=>{if(!cmap[c.date])cmap[c.date]=c;});
  const smap={};(scheduledItems||[]).forEach(s=>{if(!smap[s.date])smap[s.date]=[];smap[s.date].push(s);});
  const [editEntry,setEditEntry]=useState(null);
  const [schedModal,setSchedModal]=useState(null);
  const [logModal,setLogModal]=useState(null);

  const viewMonthStr=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const monthHistory=history.filter(w=>w.date.startsWith(viewMonthStr));
  const monthCooking=(cookingLog||[]).filter(c=>c.date.startsWith(viewMonthStr));

  const allEntries=[...history.map(e=>({...e,_type:'workout'})),...(cookingLog||[]).map(e=>({...e,_type:'cooking'}))].sort((a,b)=>b.date.localeCompare(a.date)||0);
  const upcoming=(scheduledItems||[]).filter(s=>s.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));

  const prevMonth=()=>{if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else{setViewMonth(m=>m-1);}};
  const nextMonth=()=>{if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else{setViewMonth(m=>m+1);}};
  const monthLabel=new Date(viewYear,viewMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});

  return (<>
    {editEntry&&<EditWorkoutModal entry={editEntry} onSave={(id,mins)=>{onEditEntry(id,mins);setEditEntry(null);}} onClose={()=>setEditEntry(null)} customWorkouts={customWorkouts}/>}
    {schedModal&&<ScheduleModal dateStr={schedModal} existing={smap[schedModal]||[]} onSave={item=>{onAddSchedule(item);}} onDelete={id=>onDeleteSchedule(id)} onClose={()=>setSchedModal(null)} customWorkouts={customWorkouts} customRecipes={customRecipes}/>}
    {logModal&&<LogPastWorkoutModal dateStr={logModal} onSave={(catId,wId,mins)=>{onLogPastWorkout(logModal,catId,wId,mins);setLogModal(null);}} onClose={()=>setLogModal(null)} customWorkouts={customWorkouts}/>}
    <div style={{marginBottom:24,marginTop:28}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
        <button onClick={prevMonth} style={{background:'var(--bg2)',border:'none',borderRadius:10,width:38,height:38,fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif',color:'var(--text)'}}>‹</button>
        <div style={{fontSize:26,fontWeight:900,letterSpacing:'-1px'}}>{monthLabel}</div>
        <button onClick={nextMonth} style={{background:'var(--bg2)',border:'none',borderRadius:10,width:38,height:38,fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif',color:'var(--text)'}}>›</button>
      </div>
      <div style={{textAlign:'center',fontSize:14,fontWeight:500,color:'var(--muted)'}}>{monthHistory.length} workout{monthHistory.length!==1?'s':''} · {monthCooking.length} recipe{monthCooking.length!==1?'s':''} cooked</div>
    </div>
    <div className="cal-grid">
      {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="cal-hdr">{d}</div>)}
      {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i} className="cal-day empty"/>)}
      {Array.from({length:days}).map((_,i)=>{
        const d=i+1;
        const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const wEntry=wmap[ds];const cEntry=cmap[ds];const schedList=smap[ds]||[];
        const isToday=ds===todayStr;const isFuture=ds>todayStr;const isPast=ds<todayStr;
        let bg,col,extraStyle={};
        if(wEntry&&cEntry){const wc=COLORS[wEntry.categoryId];bg=`linear-gradient(135deg,${wc.bg} 55%,#4ECDC4 55%)`;col='#fff';}
        else if(wEntry){const wc=COLORS[wEntry.categoryId];bg=wc.bg;col=wc.text;}
        else if(cEntry){bg='#4ECDC4';col='#fff';}
        else if(schedList.length>0){
          const sc=schedList[0];const schedColor=sc.type==='workout'?COLORS[sc.categoryId].bg:'#4ECDC4';
          extraStyle={background:'transparent',color:'var(--text)',border:`2px dashed ${schedColor}`,fontSize:11};
        }
        const isActive=wEntry||cEntry;
        return <div key={d} className={`cal-day ${isActive?'worked':''} ${isToday?'today':''}`}
          style={{...(isActive?{background:bg,color:col}:{}), ...extraStyle, cursor:'pointer'}}
          onClick={()=>{if(isFuture||isToday)setSchedModal(ds);else if(isPast)setLogModal(ds);}}
        >{d}</div>;
      })}
    </div>
    <div className="cal-legend">
      {Object.entries(CATEGORIES).map(([k,v])=><div key={k} className="legend-item"><div className="legend-dot" style={{background:COLORS[k].bg}}/>{v.emoji} {v.label}</div>)}
      <div className="legend-item"><div className="legend-dot" style={{background:'#4ECDC4'}}/> 🍳 Kitchen</div>
      <div className="legend-item"><div style={{width:12,height:12,borderRadius:4,border:'2px dashed #888',display:'inline-block'}}/> Planned</div>
    </div>
    {upcoming.length>0&&(<>
      <div style={{fontSize:20,fontWeight:900,letterSpacing:'-0.5px',marginBottom:14}}>Upcoming</div>
      <div className="recent-list" style={{marginBottom:24}}>
        {upcoming.map((item,i)=>{
          const itemBg=item.type==='workout'?COLORS[item.categoryId].bg:'#4ECDC4';
          const itemCol=item.type==='workout'?COLORS[item.categoryId].text:'#fff';
          const isLight=itemCol!=='#fff';
          const dateLabel=new Date(item.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
          return (
            <div key={i} className="recent-card" style={{background:itemBg}}>
              <div className="recent-icon">{item.emoji}</div>
              <div style={{flex:1}}>
                <div className="recent-name" style={{color:itemCol}}>{item.label}</div>
                <div className="recent-meta" style={{color:itemCol}}>{dateLabel}</div>
              </div>
              <div style={{display:'flex',gap:5}}>
                <button className="log-action-btn" style={{background:isLight?'rgba(200,0,0,0.12)':'rgba(255,255,255,0.18)',color:isLight?'#CC0000':itemCol}} onClick={ev=>{ev.stopPropagation();if(confirm('Remove from plan?'))onDeleteSchedule(item.id);}}>Remove</button>
              </div>
            </div>
          );
        })}
      </div>
    </>)}
    <div style={{fontSize:20,fontWeight:900,letterSpacing:'-0.5px',marginBottom:14}}>Activity Log</div>
    <div className="recent-list">
      {allEntries.slice(0,30).map((entry,i)=>{
        if(entry._type==='workout'){
          const c=COLORS[entry.categoryId];const wDef=getWorkout(entry.categoryId,entry.workoutId,customWorkouts);const isLight=c.text!=='#FFFFFF';
          return (
            <div key={i} className="recent-card" style={{background:c.bg}}>
              <div className="recent-icon">{CATEGORIES[entry.categoryId]?.emoji}</div>
              <div style={{flex:1}}>
                <div className="recent-name" style={{color:c.text}}>{wDef?.label||CATEGORIES[entry.categoryId]?.label}</div>
                <div className="recent-meta" style={{color:c.text}}>{new Date(entry.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <div className="recent-dur" style={{color:c.text}}>{entry.duration}m</div>
                <div style={{display:'flex',gap:5}}>
                  <button className="log-action-btn" style={{background:'rgba(255,255,255,0.22)',color:c.text}} onClick={ev=>{ev.stopPropagation();setEditEntry(entry);}}>Edit</button>
                  <button className="log-action-btn" style={{background:isLight?'rgba(200,0,0,0.12)':'rgba(255,255,255,0.18)',color:isLight?'#CC0000':c.text}} onClick={ev=>{ev.stopPropagation();if(confirm('Delete this workout?'))onDeleteEntry(entry.id);}}>Del</button>
                </div>
              </div>
            </div>
          );
        } else {
          const cat=MEAL_CATEGORIES[entry.mealType||'dinner'];
          return (
            <div key={i} className="recent-card" style={{background:'#4ECDC4'}}>
              <div className="recent-icon">{entry.emoji}</div>
              <div style={{flex:1}}>
                <div className="recent-name" style={{color:'#fff'}}>{entry.label}</div>
                <div className="recent-meta" style={{color:'#fff'}}>{cat.emoji} {cat.label} · {new Date(entry.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <div className="recent-dur" style={{color:'#fff'}}>{entry.duration}m</div>
                <div style={{display:'flex',gap:5}}>
                  <button className="log-action-btn" style={{background:'rgba(255,255,255,0.22)',color:'#fff'}} onClick={ev=>{ev.stopPropagation();if(confirm('Delete this entry?'))onDeleteCookingEntry(entry.id);}}>Del</button>
                </div>
              </div>
            </div>
          );
        }
      })}
    </div>
  </>);
}

// ─── RECIPE DETAIL ────────────────────────────────────────────────────────────
function RecipeDetail({recipeId,onBack,onStartCooking,customRecipes,recipePhotos,onSavePhoto,recipeComments,onSaveComment,onDeleteRecipe}) {
  const recipe=getRecipe(recipeId,customRecipes);
  if(!recipe) return null;
  const mealCat=MEAL_CATEGORIES[recipe.mealType];
  const photos=recipePhotos[recipeId]||[];
  const [comment,setComment]=useState(recipeComments[recipeId]||'');
  const [savedComment,setSavedComment]=useState(recipeComments[recipeId]||'');
  const photoRef=useRef();
  const handlePhoto=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSavePhoto(recipeId,ev.target.result);r.readAsDataURL(f);};
  const handleShare=()=>{
    const text=`${recipe.emoji} ${recipe.label}\n\nIngredients:\n${recipe.ingredients.map((g,i)=>`${i+1}. ${g}`).join('\n')}\n\nSteps:\n${recipe.steps.map((s,i)=>`${i+1}. ${s.instruction}`).join('\n')}`;
    if(navigator.share) navigator.share({title:recipe.label,text}).catch(()=>{});
    else navigator.clipboard?.writeText(text).then(()=>alert('Recipe copied to clipboard!'));
  };
  const handleDelete=()=>{if(confirm('Delete this recipe?')) onDeleteRecipe(recipeId);};
  const handleGroceryList=async()=>{
    const W=400,H=500,SCALE=2;
    const div=document.createElement('div');
    Object.assign(div.style,{position:'fixed',left:'-9999px',top:'0',width:W+'px',minHeight:H+'px',background:'#ffffff',fontFamily:"'Inter',sans-serif",padding:'32px',boxSizing:'border-box'});
    div.innerHTML=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;margin-bottom:8px">Grocery List</div><div style="font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:22px;color:#111">${recipe.emoji} ${recipe.label}</div>${recipe.ingredients.map(ing=>`<div style="display:flex;gap:12px;margin-bottom:13px;align-items:flex-start"><div style="width:20px;height:20px;border-radius:5px;border:2px solid #ddd;flex-shrink:0;margin-top:1px"></div><div style="font-size:15px;font-weight:600;color:#222;line-height:1.4">${ing}</div></div>`).join('')}<div style="margin-top:28px;font-size:11px;color:#ccc;font-weight:600;letter-spacing:0.5px">Coach Court · Kitchen</div>`;
    document.body.appendChild(div);
    try{
      const captured=await html2canvas(div,{scale:SCALE,useCORS:true,backgroundColor:'#ffffff'});
      const out=document.createElement('canvas');
      out.width=W*SCALE;out.height=H*SCALE;
      const ctx=out.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,out.width,out.height);
      ctx.drawImage(captured,0,0);
      out.toBlob(async blob=>{
        const file=new File([blob],'grocery-list.png',{type:'image/png'});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:`${recipe.label} – Grocery List`}).catch(()=>{});
        } else {
          const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='grocery-list.png';a.click();URL.revokeObjectURL(url);
        }
      },'image/png');
    }finally{document.body.removeChild(div);}
  };
  return (<>
    <div className="page-header">
      <button className="back-btn" onClick={onBack}>←</button>
      <div style={{flex:1,minWidth:0}}>
        <div className="page-title" style={{fontSize:22,lineHeight:1.2}}>{recipe.emoji} {recipe.label}</div>
        {mealCat&&<div className="page-subtitle">{mealCat.emoji} {mealCat.label}</div>}
      </div>
    </div>

    {photos.length>0&&<img src={photos[photos.length-1]} style={{width:'100%',borderRadius:20,objectFit:'cover',height:200,display:'block',marginBottom:16}} alt="Dish"/>}

    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
      <span style={{fontSize:12,fontWeight:700,color:'var(--muted)'}}>{recipe.ingredients.length} ingredients</span>
      <span style={{color:'var(--border)'}}>·</span>
      <span style={{fontSize:12,fontWeight:700,color:'var(--muted)'}}>{recipe.steps.length} steps</span>
      {(recipe.tags||[]).map((t,i)=><span key={i} className="tag-pill">{t}</span>)}
    </div>

    <button className="start-btn" style={{marginBottom:22,background:'#1A8080',color:'#fff'}} onClick={()=>onStartCooking(recipeId)}>Start Cooking →</button>

    <div style={{background:'var(--bg2)',borderRadius:20,padding:18,marginBottom:14}}>
      <div className="recipe-section-title">Ingredients</div>
      {recipe.ingredients.map((ing,i)=>(
        <div key={i} style={{display:'flex',gap:10,marginBottom:8,alignItems:'flex-start'}}>
          <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',minWidth:20,lineHeight:1.6}}>{i+1}</div>
          <div style={{fontSize:14,fontWeight:600,lineHeight:1.4}}>{ing}</div>
        </div>
      ))}
      <button onClick={handleGroceryList} style={{width:'100%',marginTop:8,border:'2px solid var(--border)',borderRadius:50,padding:12,fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:700,cursor:'pointer',background:'var(--bg)',color:'var(--text)'}}>🛒 Make Grocery List</button>
    </div>

    <div style={{background:'var(--bg2)',borderRadius:20,padding:18,marginBottom:14}}>
      <div className="recipe-section-title">Steps</div>
      {recipe.steps.map((step,i)=>(
        <div key={i} className="recipe-step-row">
          <div className="recipe-step-num">{i+1}</div>
          <div className="recipe-step-text">
            {step.instruction}
            {step.timerSeconds&&<span style={{marginLeft:6,fontSize:11,fontWeight:700,background:'rgba(78,205,196,0.15)',borderRadius:50,padding:'2px 8px',color:'#1A8080',whiteSpace:'nowrap',display:'inline-block',marginTop:4}}>⏱ {fmt(step.timerSeconds)}</span>}
          </div>
        </div>
      ))}
    </div>

    <div style={{marginBottom:14}}>
      <div className="recipe-section-title">Photos</div>
      {photos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          {photos.map((p,i)=><img key={i} src={p} style={{width:'100%',borderRadius:12,height:110,objectFit:'cover'}} alt=""/>)}
        </div>
      )}
      <button className="photo-capture-btn" style={{borderColor:'#4ECDC4',color:'#1A8080'}} onClick={()=>photoRef.current.click()}>📷 Add Photo</button>
      <input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto}/>
    </div>

    <div style={{marginBottom:14}}>
      <div className="recipe-section-title">Notes</div>
      <textarea className="comment-input" value={comment} onChange={e=>setComment(e.target.value)} placeholder="Add notes, substitutions, or tips…"/>
      {comment!==savedComment&&<button onClick={()=>{onSaveComment(recipeId,comment);setSavedComment(comment);}} style={{width:'100%',border:'none',borderRadius:50,padding:12,fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:800,cursor:'pointer',background:'var(--text)',color:'#fff',marginTop:8}}>Save Notes</button>}
      {savedComment&&comment===savedComment&&<div style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:6}}>✓ Notes saved</div>}
    </div>

    <div style={{display:'flex',gap:10,marginBottom:28}}>
      <button onClick={handleShare} style={{flex:1,border:'2px solid var(--border)',borderRadius:50,padding:14,fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:700,cursor:'pointer',background:'var(--bg2)',color:'var(--text)'}}>📤 Share Recipe</button>
      {recipe.custom&&<button onClick={handleDelete} style={{flex:1,border:'2px solid #FFB3B3',borderRadius:50,padding:14,fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:700,cursor:'pointer',background:'#FFF0F0',color:'#CC0000'}}>🗑 Delete</button>}
    </div>
  </>);
}

function getIngredientMatch(recipe, selectedIds) {
  const ings = recipe.ingredients || [];
  if (!ings.length || !selectedIds.length) return {matched:0, total:ings.length};
  const matched = ings.filter(ing => {
    const lower = ing.toLowerCase();
    return selectedIds.some(id => (PANTRY_KEYWORD_MAP[id]||[]).some(kw => lower.includes(kw)));
  }).length;
  return {matched, total:ings.length};
}

function ProfileView({history,profile,userEmail,onEdit,onSignOut}) {
  const total=history.length;const totalMins=history.reduce((a,w)=>a+w.duration,0);
  const streak=(()=>{let s=0;const t=new Date();for(let i=0;i<60;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(history.find(w=>w.date===d.toISOString().split('T')[0]))s++;else if(i>0)break;}return s;})();
  const weeks=Array.from({length:8}).map((_,i)=>{const ws=new Date();ws.setDate(ws.getDate()-(7*(7-i)));let c=0;for(let d=0;d<7;d++){const dd=new Date(ws);dd.setDate(ws.getDate()+d);if(history.find(w=>w.date===dd.toISOString().split('T')[0]))c++;}return c;});
  const maxW=Math.max(...weeks,1);
  const catCounts={};history.forEach(w=>{catCounts[w.categoryId]=(catCounts[w.categoryId]||0)+1;});
  const initials=(profile?.name||'A').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const shareRef=React.useRef(null);
  const [sharing,setSharing]=React.useState(false);

  const handleShare=async()=>{
    if(!shareRef.current||sharing)return;
    setSharing(true);
    try{
      const SHARE_W=390,PADDING=20,SCALE=2;
      const SHARE_H=Math.round(SHARE_W*16/9);
      const CONTENT_W=SHARE_W-2*PADDING;
      const wrapper=document.createElement('div');
      Object.assign(wrapper.style,{position:'fixed',left:'-9999px',top:'0',width:CONTENT_W+'px',background:'#ffffff',fontFamily:"'Inter',sans-serif"});
      const clone=shareRef.current.cloneNode(true);
      wrapper.appendChild(clone);
      document.body.appendChild(wrapper);
      let srcCanvas;
      try{srcCanvas=await html2canvas(wrapper,{scale:SCALE,useCORS:true,backgroundColor:'#ffffff',logging:false});}
      finally{document.body.removeChild(wrapper);}
      const out=document.createElement('canvas');
      out.width=SHARE_W*SCALE;out.height=SHARE_H*SCALE;
      const ctx=out.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,out.width,out.height);
      const iW=(SHARE_W-2*PADDING)*SCALE,iH=(SHARE_H-2*PADDING)*SCALE;
      const sc=Math.min(iW/srcCanvas.width,iH/srcCanvas.height,1);
      const dW=Math.round(srcCanvas.width*sc),dH=Math.round(srcCanvas.height*sc);
      const dX=PADDING*SCALE+Math.round((iW-dW)/2),dY=PADDING*SCALE;
      ctx.drawImage(srcCanvas,dX,dY,dW,dH);
      out.toBlob(async(blob)=>{
        if(!blob){setSharing(false);return;}
        const file=new File([blob],'coach-court-stats.jpg',{type:'image/jpeg'});
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          try{await navigator.share({files:[file],title:'My Coach Court Stats'});}catch(e){/* cancelled */}
        } else {
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download='coach-court-stats.jpg';a.click();
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        }
        setSharing(false);
      },'image/jpeg',0.92);
    }catch(e){setSharing(false);}
  };

  return (<>
    <div ref={shareRef} style={{background:'#fff'}}>
      <div className="profile-hero" style={{background:COLORS.upper.bg}}>
        <div className="avatar" onClick={onEdit}>{profile?.photo?<img src={profile.photo} alt=""/>:initials}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="profile-name" style={{color:COLORS.upper.text}}>{profile?.name||'Athlete'}</div>
          <div className="profile-since" style={{color:COLORS.upper.text}}>Since {profile?.since||'—'}</div>
        </div>
        <button className="edit-btn" onClick={onEdit} style={{color:COLORS.upper.text}}>Edit</button>
      </div>
      <div className="big-stats">
        <div className="big-stat" style={{background:COLORS.lower.bg}}><div className="big-stat-num" style={{color:COLORS.lower.text}}>{total}</div><div className="big-stat-lbl" style={{color:COLORS.lower.text}}>Workouts</div></div>
        <div className="big-stat" style={{background:COLORS.fullbody.bg}}><div className="big-stat-num" style={{color:COLORS.fullbody.text}}>{streak}🔥</div><div className="big-stat-lbl" style={{color:COLORS.fullbody.text}}>Streak</div></div>
        <div className="big-stat" style={{background:COLORS.cardio.bg}}><div className="big-stat-num" style={{color:COLORS.cardio.text}}>{Math.round(totalMins/60)}h</div><div className="big-stat-lbl" style={{color:COLORS.cardio.text}}>Hours</div></div>
        <div className="big-stat" style={{background:'var(--bg2)'}}><div className="big-stat-num">{total>0?Math.round(totalMins/total):0}m</div><div className="big-stat-lbl">Avg</div></div>
      </div>
      <div className="chart-block">
        <div className="chart-title">Workouts per Week</div>
        <div className="chart-bars">{weeks.map((w,i)=><div key={i} className="bar-wrap"><div className="bar" style={{height:`${(w/maxW)*100}%`,background:i%2===0?COLORS.upper.bg:COLORS.lower.bg}}/><div className="bar-lbl">W{i+1}</div></div>)}</div>
      </div>
      <div style={{fontSize:20,fontWeight:900,letterSpacing:'-0.5px',margin:'14px 0 12px'}}>By Category</div>
      <div className="breakdown">{Object.entries(CATEGORIES).map(([k,v])=><div key={k} className="breakdown-tile"><div className="bd-emoji">{v.emoji}</div><div><div className="bd-num" style={{color:COLORS[k].bg==='#D4F54A'?'#5A7A00':COLORS[k].bg==='#C4A8FF'?'#7C4DFF':COLORS[k].bg}}>{catCounts[k]||0}</div><div className="bd-lbl">{v.label}</div></div></div>)}</div>
      <div style={{fontSize:10,fontWeight:700,textAlign:'center',letterSpacing:'1px',color:'var(--muted)',opacity:0.5,marginTop:12,textTransform:'uppercase'}}>Coach Court</div>
    </div>

    <button onClick={handleShare} disabled={sharing} style={{
      width:'100%',border:'none',borderRadius:18,padding:'16px',marginTop:14,
      background:'var(--text)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',
      fontFamily:'Inter,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
      opacity:sharing?0.6:1,transition:'opacity 0.2s',
    }}>{sharing?'Generating…':'📤 Share Stats'}</button>

    <div style={{fontSize:20,fontWeight:900,letterSpacing:'-0.5px',margin:'20px 0 12px'}}>Account</div>
    <div className="settings-section">
      <div className="settings-row">
        <div>
          <div className="settings-label">📧 {userEmail||'—'}</div>
          <div className="settings-sub">Signed in · stays logged in automatically</div>
        </div>
      </div>
      <div className="settings-row">
        <div>
          <div className="settings-label">🚪 Sign Out</div>
          <div className="settings-sub">You'll need your email and password to log back in</div>
        </div>
        <button className="settings-action danger" onClick={onSignOut}>Sign out</button>
      </div>
    </div>
  </>);
}

  const deleteScheduledItem=id=>{setScheduledItems(prev=>{const updated=prev.filter(i=>i.id!==id);localStorage.setItem('cc-scheduled',JSON.stringify(updated));return updated;});};

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY')setResetMode(true);
      setSession(session);
    });
    const handleVisibility=()=>{ if(document.visibilityState==="visible"){ sb.auth.getSession().then(({data:{session}})=>{ if(session) setSession(session); }); } };
    document.addEventListener("visibilitychange",handleVisibility);
    const handleHash=()=>{ if(window.location.hash&&window.location.hash.includes("access_token")){ if(window.location.hash.includes("type=recovery"))setResetMode(true); sb.auth.getSession().then(({data:{session}})=>{ if(session) setSession(session); }); } };
    window.addEventListener("hashchange",handleHash);
    handleHash();
    return()=>{ subscription.unsubscribe(); document.removeEventListener("visibilitychange",handleVisibility); window.removeEventListener("hashchange",handleHash); };
  },[]);

  useEffect(()=>{
    if(!session)return;
    (async()=>{
      setDataLoading(true);

        const fresh=await loadData();

      }catch(e){setError('Could not load data.');}

  // eslint-disable-next-line react-hooks/exhaustive-deps
